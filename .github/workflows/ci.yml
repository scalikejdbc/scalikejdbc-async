name: CI
on:
  pull_request:
  push:
    branches:
      - master
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        java: [17, 25]
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-java@v5
      with:
        java-version: "${{ matrix.java }}"
        distribution: temurin
    - uses: sbt/setup-sbt@v1
    - run: sbt -v --server scalafmtSbtCheck "+ scalafmtCheckAll" "+ test"
